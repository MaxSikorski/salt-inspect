# SALT Stage 1: MAE Teacher Training on MVTec AD (224×224)
# Trains encoder + decoder with pixel reconstruction on normal images only.

model:
  encoder:
    img_size: 224
    patch_size: 16
    embed_dim: 192
    depth: 12
    num_heads: 3
    mlp_ratio: 4.0

  decoder:
    encoder_embed_dim: 192
    decoder_embed_dim: 96
    decoder_depth: 4
    decoder_num_heads: 3
    patch_size: 16
    in_channels: 3

training:
  epochs: 200
  batch_size: 32
  norm_pix: true
  gradient_clip: 1.0

  optimizer:
    lr: 1.5e-4
    weight_decay: 0.04
    betas: [0.9, 0.95]
    min_lr: 1.0e-6

  masking:
    num_targets: 4
    grid_size: 14  # 224 / 16 = 14

data:
  dataset: mvtec-ad
  split: train
  defect_type: good  # Train on normal images only
  img_size: 224
  augmentation:
    random_resized_crop:
      scale: [0.2, 1.0]
    horizontal_flip: true
