<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Magnifying glass lens -->
  <circle cx="13.5" cy="13.5" r="7.5" stroke="#ef4444" stroke-width="2" fill="none"/>
  <!-- Crosshair inside lens (precision scanning) -->
  <line x1="13.5" y1="7.5" x2="13.5" y2="19.5" stroke="#ef4444" stroke-width="0.7" opacity="0.35"/>
  <line x1="7.5" y1="13.5" x2="19.5" y2="13.5" stroke="#ef4444" stroke-width="0.7" opacity="0.35"/>
  <!-- Handle -->
  <line x1="19" y1="19" x2="26" y2="26" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Detection dot (anomaly found) -->
  <circle cx="16" cy="11" r="1.5" fill="#ef4444" opacity="0.8"/>
</svg>
